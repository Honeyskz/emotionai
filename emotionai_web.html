<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EmotionAI — Detector de Emociones</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0B0C10;
      --surface:   #13151B;
      --border:    #1F2230;
      --text:      #C8CADB;
      --text-dim:  #50546A;
      --accent:    #E2E4F0;

      /* por emoción */
      --c-feliz:      #F59E0B;
      --c-triste:     #3B82F6;
      --c-enojo:      #EF4444;
      --c-sorpresa:   #F97316;
      --c-neutral:    #6EE7B7;
      --c-idle:       #2A2D3E;

      --active-glow:  var(--c-idle);
      --active-color: var(--c-idle);

      font-family: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      position: relative; z-index: 1;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .logo span { color: var(--accent); }
    .tpu-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.4s;
    }
    .tpu-badge.connected { border-color: #6EE7B7; color: #6EE7B7; }
    .tpu-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.4s;
    }
    .tpu-badge.connected .tpu-dot {
      background: #6EE7B7;
      box-shadow: 0 0 6px #6EE7B7;
      animation: blink 1.5s ease infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── MAIN EMOTION DISPLAY ─────────────────────── */
    .main-panel {
      width: 100%;
      max-width: 760px;
      position: relative; z-index: 1;
      margin-bottom: 2rem;
    }

    .emotion-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.5s, box-shadow 0.5s;
    }
    .emotion-hero.active {
      border-color: var(--active-color);
      box-shadow: 0 0 40px -10px var(--active-glow);
    }

    /* glow sweep */
    .emotion-hero::before {
      content: '';
      position: absolute;
      top: -40%; left: -20%;
      width: 60%; height: 200%;
      background: radial-gradient(ellipse, var(--active-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }
    .emotion-hero.active::before { opacity: 0.08; }

    /* big face */
    .hero-face {
      flex-shrink: 0;
      width: 100px; height: 100px;
    }
    .hero-face svg { width: 100%; height: 100%; }

    .hero-info { flex: 1; }
    .hero-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .hero-emotion {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--accent);
      text-transform: capitalize;
      line-height: 1;
      transition: color 0.4s;
    }
    .hero-emotion.colored { color: var(--active-color); }

    .confidence-bar-wrap {
      margin-top: 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .confidence-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--active-color);
      width: 0%;
      transition: width 0.6s cubic-bezier(.4,0,.2,1), background 0.4s;
    }
    .confidence-pct {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      min-width: 36px;
      text-align: right;
      transition: color 0.4s;
    }
    .confidence-pct.lit { color: var(--active-color); }

    /* stats row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-top: 1.2rem;
    }
    .stat-chip {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      display: flex;
      gap: 6px;
    }
    .stat-chip .val { color: var(--text); }

    /* ── FACES GRID ────────────────────────────────── */
    .faces-grid {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap: 12px;
      position: relative; z-index: 1;
    }

    .face-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 6px 14px;
      border-radius: 18px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      transition: border-color 0.4s, background 0.4s, transform 0.3s, box-shadow 0.4s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .face-card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 18px;
      background: var(--card-glow, transparent);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .face-card.active::after { opacity: 0.06; }

    .face-card.active {
      transform: translateY(-6px) scale(1.03);
    }

    .face-card.e-felicidad.active  { border-color: var(--c-feliz);    box-shadow: 0 8px 30px -8px var(--c-feliz);    --card-glow: var(--c-feliz); }
    .face-card.e-tristeza.active   { border-color: var(--c-triste);   box-shadow: 0 8px 30px -8px var(--c-triste);   --card-glow: var(--c-triste); }
    .face-card.e-enojo.active      { border-color: var(--c-enojo);    box-shadow: 0 8px 30px -8px var(--c-enojo);    --card-glow: var(--c-enojo); }
    .face-card.e-sorpresa.active   { border-color: var(--c-sorpresa); box-shadow: 0 8px 30px -8px var(--c-sorpresa); --card-glow: var(--c-sorpresa); }
    .face-card.e-neutralidad.active{ border-color: var(--c-neutral);  box-shadow: 0 8px 30px -8px var(--c-neutral);  --card-glow: var(--c-neutral); }

    .face-svg { width: 66px; height: 66px; }

    /* SVG colorize on active */
    .face-card .feat { stroke: #3A3D50; transition: stroke 0.4s; }
    .face-card .face-bg { fill: #1A1C28; transition: fill 0.4s; }
    .face-card.e-felicidad.active   .feat { stroke: var(--c-feliz); }
    .face-card.e-felicidad.active   .face-bg { fill: #2A220A; }
    .face-card.e-tristeza.active    .feat { stroke: var(--c-triste); }
    .face-card.e-tristeza.active    .face-bg { fill: #0A1228; }
    .face-card.e-enojo.active       .feat { stroke: var(--c-enojo); }
    .face-card.e-enojo.active       .face-bg { fill: #280A0A; }
    .face-card.e-sorpresa.active    .feat { stroke: var(--c-sorpresa); }
    .face-card.e-sorpresa.active    .face-bg { fill: #281608; }
    .face-card.e-neutralidad.active .feat { stroke: var(--c-neutral); }
    .face-card.e-neutralidad.active .face-bg { fill: #0A2820; }

    .face-name {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.4s;
    }
    .face-card.e-felicidad.active   .face-name { color: var(--c-feliz); }
    .face-card.e-tristeza.active    .face-name { color: var(--c-triste); }
    .face-card.e-enojo.active       .face-name { color: var(--c-enojo); }
    .face-card.e-sorpresa.active    .face-name { color: var(--c-sorpresa); }
    .face-card.e-neutralidad.active .face-name { color: var(--c-neutral); }

    .face-pill {
      width: 20px; height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.4s, width 0.4s;
    }
    .face-card.e-felicidad.active   .face-pill { background: var(--c-feliz);    width: 38px; }
    .face-card.e-tristeza.active    .face-pill { background: var(--c-triste);   width: 38px; }
    .face-card.e-enojo.active       .face-pill { background: var(--c-enojo);    width: 38px; }
    .face-card.e-sorpresa.active    .face-pill { background: var(--c-sorpresa); width: 38px; }
    .face-card.e-neutralidad.active .face-pill { background: var(--c-neutral);  width: 38px; }

    /* pulse ring on active */
    .face-card.active .face-svg {
      animation: pulse-ring 1.6s ease infinite;
    }
    @keyframes pulse-ring {
      0%   { filter: drop-shadow(0 0 0px var(--active-color)); }
      50%  { filter: drop-shadow(0 0 8px var(--active-color)); }
      100% { filter: drop-shadow(0 0 0px var(--active-color)); }
    }

    /* ── CONNECTION STATUS ─────────────────────────── */
    .conn-bar {
      width: 100%;
      max-width: 760px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative; z-index: 1;
    }
    .conn-msg {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .conn-msg.error { color: #EF4444; }
    .conn-msg.ok    { color: #6EE7B7; }
    .ip-hint {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }
    .ip-hint input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      width: 160px;
      outline: none;
      transition: border-color 0.3s;
    }
    .ip-hint input:focus { border-color: var(--accent); }

    /* ── SCAN LINE ANIMATION ────────────────────────── */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--active-color), transparent);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: background 0.4s;
    }
    .scanline.sweep {
      animation: sweep 0.8s ease forwards;
    }
    @keyframes sweep {
      0%   { opacity: 0.7; top: 0; }
      100% { opacity: 0;   top: 100%; }
    }

    /* ── RESPONSIVE ────────────────────────────────── */
    @media (max-width: 560px) {
      .faces-grid { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
      .emotion-hero { flex-direction: column; text-align: center; }
      .stats-row { flex-wrap: wrap; }
    }
    @media (max-width: 360px) {
      .faces-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
  </style>
</head>
<body>

<div class="scanline" id="scanline"></div>

<!-- HEADER -->
<header>
  <div class="logo"><span>Emotion</span>AI Web</div>
  <div class="tpu-badge" id="tpuBadge">
    <div class="tpu-dot" id="tpuDot"></div>
    <span id="tpuText">TPU desconectado</span>
  </div>
</header>

<!-- HERO -->
<div class="main-panel">
  <div class="emotion-hero" id="emotionHero">
    <!-- big face rendered by JS -->
    <div class="hero-face" id="heroFace"></div>
    <div class="hero-info">
      <div class="hero-label">emoción detectada</div>
      <div class="hero-emotion" id="heroEmotion">—</div>
      <div class="confidence-bar-wrap">
        <div class="confidence-bar"><div class="confidence-fill" id="confFill"></div></div>
        <div class="confidence-pct" id="confPct">—</div>
      </div>
      <div class="stats-row">
        <div class="stat-chip">FPS <span class="val" id="fpsVal">—</span></div>
        <div class="stat-chip">CORAL <span class="val" id="coralVal">—</span></div>
        <div class="stat-chip">CONFIANZA <span class="val" id="confChip">—</span></div>
      </div>
    </div>
  </div>
</div>

<!-- FACE CARDS -->
<div class="faces-grid">

  <div class="face-card e-felicidad" data-emotion="feliz" id="card-feliz">
    <svg class="face-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="face-bg" cx="36" cy="36" r="32" fill="#1A1C28"/>
      <circle cx="36" cy="36" r="32" stroke="#3A3D50" stroke-width="1.5" class="feat"/>
      <ellipse cx="26" cy="30" rx="3" ry="3.5" fill="#3A3D50" class="feat" stroke="none"/>
      <ellipse cx="46" cy="30" rx="3" ry="3.5" fill="#3A3D50" class="feat" stroke="none"/>
      <circle cx="27.2" cy="28.5" r="1" fill="white" opacity="0.4"/>
      <circle cx="47.2" cy="28.5" r="1" fill="white" opacity="0.4"/>
      <path d="M24 42 Q36 54 48 42" stroke="#3A3D50" stroke-width="2.2" stroke-linecap="round" fill="none" class="feat"/>
      <ellipse cx="21" cy="43" rx="5" ry="3" fill="#F0997B" opacity="0.15"/>
      <ellipse cx="51" cy="43" rx="5" ry="3" fill="#F0997B" opacity="0.15"/>
    </svg>
    <span class="face-name">felicidad</span>
    <div class="face-pill"></div>
  </div>

  <div class="face-card e-tristeza" data-emotion="triste" id="card-triste">
    <svg class="face-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="face-bg" cx="36" cy="36" r="32" fill="#1A1C28"/>
      <circle cx="36" cy="36" r="32" stroke="#3A3D50" stroke-width="1.5" class="feat"/>
      <path d="M22 25 Q26 22 30 24" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" fill="none" class="feat"/>
      <path d="M42 24 Q46 22 50 25" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" fill="none" class="feat"/>
      <ellipse cx="26" cy="32" rx="3" ry="3.5" fill="#3A3D50" class="feat" stroke="none"/>
      <ellipse cx="46" cy="32" rx="3" ry="3.5" fill="#3A3D50" class="feat" stroke="none"/>
      <circle cx="27.2" cy="30.5" r="1" fill="white" opacity="0.4"/>
      <circle cx="47.2" cy="30.5" r="1" fill="white" opacity="0.4"/>
      <path d="M26 36 Q24 41 26 43 Q28 41 26 36" fill="#3A3D50" class="feat" stroke="none"/>
      <path d="M24 48 Q36 39 48 48" stroke="#3A3D50" stroke-width="2.2" stroke-linecap="round" fill="none" class="feat"/>
    </svg>
    <span class="face-name">tristeza</span>
    <div class="face-pill"></div>
  </div>

  <div class="face-card e-enojo" data-emotion="enojado" id="card-enojado">
    <svg class="face-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="face-bg" cx="36" cy="36" r="32" fill="#1A1C28"/>
      <circle cx="36" cy="36" r="32" stroke="#3A3D50" stroke-width="1.5" class="feat"/>
      <path d="M21 24 L31 28" stroke="#3A3D50" stroke-width="2.5" stroke-linecap="round" fill="none" class="feat"/>
      <path d="M41 28 L51 24" stroke="#3A3D50" stroke-width="2.5" stroke-linecap="round" fill="none" class="feat"/>
      <path d="M22 33 Q26 29 30 33" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" fill="none" class="feat"/>
      <path d="M42 33 Q46 29 50 33" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" fill="none" class="feat"/>
      <path d="M26 47 Q36 41 46 47" stroke="#3A3D50" stroke-width="2.2" stroke-linecap="round" fill="none" class="feat"/>
    </svg>
    <span class="face-name">enojo</span>
    <div class="face-pill"></div>
  </div>

  <div class="face-card e-sorpresa" data-emotion="sorprendido" id="card-sorprendido">
    <svg class="face-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="face-bg" cx="36" cy="36" r="32" fill="#1A1C28"/>
      <circle cx="36" cy="36" r="32" stroke="#3A3D50" stroke-width="1.5" class="feat"/>
      <path d="M22 22 Q26 18 30 21" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" fill="none" class="feat"/>
      <path d="M42 21 Q46 18 50 22" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" fill="none" class="feat"/>
      <circle cx="26" cy="30" r="4.5" stroke="#3A3D50" stroke-width="1.5" fill="none" class="feat"/>
      <circle cx="46" cy="30" r="4.5" stroke="#3A3D50" stroke-width="1.5" fill="none" class="feat"/>
      <circle cx="26" cy="30" r="2.2" fill="#3A3D50" class="feat" stroke="none"/>
      <circle cx="46" cy="30" r="2.2" fill="#3A3D50" class="feat" stroke="none"/>
      <circle cx="27" cy="28.8" r="0.9" fill="white" opacity="0.4"/>
      <circle cx="47" cy="28.8" r="0.9" fill="white" opacity="0.4"/>
      <ellipse cx="36" cy="47" rx="7" ry="8" stroke="#3A3D50" stroke-width="1.8" fill="none" class="feat"/>
      <ellipse cx="36" cy="51" rx="4.5" ry="3" fill="#3A3D50" opacity="0.1" class="feat" stroke="none"/>
    </svg>
    <span class="face-name">sorpresa</span>
    <div class="face-pill"></div>
  </div>

  <div class="face-card e-neutralidad" data-emotion="neutral" id="card-neutral">
    <svg class="face-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="face-bg" cx="36" cy="36" r="32" fill="#1A1C28"/>
      <circle cx="36" cy="36" r="32" stroke="#3A3D50" stroke-width="1.5" class="feat"/>
      <line x1="22" y1="26" x2="30" y2="26" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" class="feat"/>
      <line x1="42" y1="26" x2="50" y2="26" stroke="#3A3D50" stroke-width="2" stroke-linecap="round" class="feat"/>
      <ellipse cx="26" cy="33" rx="3.2" ry="3" fill="#3A3D50" class="feat" stroke="none"/>
      <ellipse cx="46" cy="33" rx="3.2" ry="3" fill="#3A3D50" class="feat" stroke="none"/>
      <circle cx="27" cy="31.8" r="1" fill="white" opacity="0.4"/>
      <circle cx="47" cy="31.8" r="1" fill="white" opacity="0.4"/>
      <line x1="26" y1="46" x2="46" y2="46" stroke="#3A3D50" stroke-width="2.2" stroke-linecap="round" class="feat"/>
    </svg>
    <span class="face-name">neutralidad</span>
    <div class="face-pill"></div>
  </div>

</div>

<!-- CONNECTION BAR -->
<div class="conn-bar">
  <div class="conn-msg" id="connMsg">Buscando servidor…</div>
  <div class="ip-hint">
    IP Raspberry Pi:&nbsp;
    <input type="text" id="ipInput" value="192.168.1.100" placeholder="192.168.1.100"/>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const POLL_MS     = 700;   // ms entre requests
const ENDPOINT    = () => `http://${document.getElementById('ipInput').value.trim()}:5000/emotion`;

// mapa: lo que Flask devuelve → id de la card
const EMOTION_MAP = {
  'feliz':        'feliz',
  'felicidad':    'feliz',
  'happy':        'feliz',
  'triste':       'triste',
  'tristeza':     'triste',
  'sad':          'triste',
  'enojado':      'enojado',
  'enojo':        'enojado',
  'angry':        'enojado',
  'sorprendido':  'sorprendido',
  'sorpresa':     'sorprendido',
  'surprised':    'sorprendido',
  'neutral':      'neutral',
  'neutralidad':  'neutral',
};

// color por emoción
const COLORS = {
  feliz:        '#F59E0B',
  triste:       '#3B82F6',
  enojado:      '#EF4444',
  sorprendido:  '#F97316',
  neutral:      '#6EE7B7',
};

// SVG completo para el hero (mismo de las cards, más grande)
const HERO_SVGS = {

const NAMES = {
  feliz: 'Felicidad', triste: 'Tristeza',
  enojado: 'Enojo', sorprendido: 'Sorpresa', neutral: 'Neutralidad',
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentEmotion = null;
let pollTimer      = null;
let failCount      = 0;

// ─── DOM REFS ──────────────────────────────────────────────────────────────
const heroEl     = document.getElementById('emotionHero');
const heroFaceEl = document.getElementById('heroFace');
const heroEmEl   = document.getElementById('heroEmotion');
const confFillEl = document.getElementById('confFill');
const confPctEl  = document.getElementById('confPct');
const fpsValEl   = document.getElementById('fpsVal');
const coralValEl = document.getElementById('coralVal');
const confChipEl = document.getElementById('confChip');
const tpuBadge   = document.getElementById('tpuBadge');
const tpuText    = document.getElementById('tpuText');
const connMsgEl  = document.getElementById('connMsg');
const scanlineEl = document.getElementById('scanline');

// ─── UPDATE UI ─────────────────────────────────────────────────────────────
function activateEmotion(key, confidence, fps, tpu) {
  const color = COLORS[key] || '#2A2D3E';

  // deactivate all cards
  document.querySelectorAll('.face-card').forEach(c => c.classList.remove('active'));
  // activate matching card
  const card = document.getElementById('card-' + key);
  if (card) card.classList.add('active');

  // hero
  heroEl.classList.add('active');
  heroFaceEl.innerHTML = HERO_SVGS[key] || '';
  heroEmEl.textContent = NAMES[key] || key;
  heroEmEl.classList.add('colored');

  // set CSS var for glow
  document.documentElement.style.setProperty('--active-color', color);
  document.documentElement.style.setProperty('--active-glow', color);

  // confidence bar
  const pct = Math.round(confidence * (confidence <= 1 ? 100 : 1));
  confFillEl.style.width = pct + '%';
  confPctEl.textContent  = pct + '%';
  confPctEl.classList.add('lit');

  // chips
  fpsValEl.textContent   = fps !== undefined ? fps : '—';
  coralValEl.textContent = tpu || '—';
  confChipEl.textContent = pct + '%';

  // TPU badge
  const tpuOk = tpu && tpu.toLowerCase().includes('conectado') || tpu === 'active';
  tpuBadge.classList.toggle('connected', tpuOk);
  tpuText.textContent = tpuOk ? 'TPU activo' : (tpu || 'TPU —');

  // scanline sweep on change
  if (key !== currentEmotion) {
    triggerScanline();
    currentEmotion = key;
  }
}

function clearEmotion() {
  document.querySelectorAll('.face-card').forEach(c => c.classList.remove('active'));
  heroEl.classList.remove('active');
  heroFaceEl.innerHTML = '';
  heroEmEl.textContent = '—';
  heroEmEl.classList.remove('colored');
  confFillEl.style.width = '0%';
  confPctEl.textContent  = '—';
  confPctEl.classList.remove('lit');
  fpsValEl.textContent   = '—';
  coralValEl.textContent = '—';
  confChipEl.textContent = '—';
  document.documentElement.style.setProperty('--active-color', '#2A2D3E');
  document.documentElement.style.setProperty('--active-glow', 'transparent');
  tpuBadge.classList.remove('connected');
  tpuText.textContent = 'TPU desconectado';
  currentEmotion = null;
}

function triggerScanline() {
  scanlineEl.classList.remove('sweep');
  void scanlineEl.offsetWidth; // reflow
  scanlineEl.classList.add('sweep');
}

// ─── FETCH LOOP ────────────────────────────────────────────────────────────
async function fetchEmotion() {
  try {
    const res  = await fetch(ENDPOINT(), { signal: AbortSignal.timeout(1500) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Normalizar la emoción que devuelve Flask
    // Espera: { emotion: "Feliz", confidence: 0.97, fps: 32, tpu: "Conectado" }
    const rawEmotion = (data.emotion || '').toLowerCase().trim();
    const key        = EMOTION_MAP[rawEmotion];

    failCount = 0;
    connMsgEl.textContent = '● Recibiendo datos en tiempo real';
    connMsgEl.className   = 'conn-msg ok';

    if (key) {
      activateEmotion(key, data.confidence ?? data.confianza ?? 0, data.fps, data.tpu ?? data.coral);
    } else {
      clearEmotion();
      connMsgEl.textContent = '● Sin rostro detectado';
      connMsgEl.className   = 'conn-msg';
    }
  } catch (e) {
    failCount++;
    clearEmotion();
    if (failCount === 1) {
      connMsgEl.textContent = '● Intentando conectar con la Raspberry Pi…';
      connMsgEl.className   = 'conn-msg';
    } else {
      connMsgEl.textContent = '✕ Sin conexión — revisá la IP y que Flask esté corriendo';
      connMsgEl.className   = 'conn-msg error';
    }
  } finally {
    pollTimer = setTimeout(fetchEmotion, POLL_MS);
  }
}

// ─── IP INPUT — reinicia si cambia ─────────────────────────────────────────
document.getElementById('ipInput').addEventListener('change', () => {
  clearTimeout(pollTimer);
  failCount = 0;
  connMsgEl.textContent = 'Buscando servidor…';
  connMsgEl.className   = 'conn-msg';
  fetchEmotion();
});

// ─── INIT ──────────────────────────────────────────────────────────────────
fetchEmotion();
</script>
